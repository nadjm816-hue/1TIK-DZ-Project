name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2
          ndk: false
          cmake: false

      - name: Install dependencies
        working-directory: social-app
        run: npm ci

      - name: Build Next.js static assets
        working-directory: social-app
        run: npm run build

      - name: Generate Capacitor assets
        working-directory: social-app
        run: npm run cap:assets:generate

      - name: Sync Capacitor Android
        working-directory: social-app
        run: npx cap sync android

      - name: Build Android Debug APK
        working-directory: social-app/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1TIK-DZ-Beta-App
          path: social-app/android/app/build/outputs/apk/debug/app-debug.apk
